<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Выбор ПВЗ и оформление заказа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .widget-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        .widget-card:hover {
            transform: translateY(-4px);
        }

        .widget-header {
            background: linear-gradient(135deg, #1a2c3e 0%, #1e3a5f 100%);
            color: white;
            padding: 30px 35px;
            text-align: center;
        }

        .widget-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .widget-header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .widget-body {
            padding: 25px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .form-header {
            background: linear-gradient(135deg, #1a2c3e 0%, #1e3a5f 100%);
            color: white;
            padding: 25px 35px;
        }

        .form-header h2 {
            font-size: 24px;
            font-weight: 600;
        }

        .form-header p {
            font-size: 14px;
            opacity: 0.85;
            margin-top: 6px;
        }

        .form-body {
            padding: 35px;
        }

        .info-row {
            background: linear-gradient(135deg, #f0f4fa 0%, #e8edf5 100%);
            padding: 18px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-left: 4px solid #667eea;
        }

        .info-row span:first-child {
            font-weight: 700;
            color: #1a2c3e;
        }

        .info-row span:last-child {
            color: #4a6fa5;
            word-break: break-all;
            font-weight: 500;
        }

        .yandex-form-container {
            margin-top: 10px;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .yandex-form-container iframe {
            width: 100%;
            border: none;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #1a2c3e;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card {
            animation: fadeInUp 0.6s ease;
        }

        @media (max-width: 768px) {
            .widget-body {
                padding: 15px;
            }
            .form-body {
                padding: 20px;
            }
            .widget-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="widget-card">
        <div class="widget-header">
            <h1>📍 Выберите пункт выдачи для получения бесплатных пробных пинов </h1>
            <h1> Доставка = 0 р. </h1>
        </div>
        <div class="widget-body">
            <div id="delivery-widget"></div>
        </div>
    </div>

    <div class="form-card" id="order-form-block" style="display: none;">
        <div class="form-header">
            <h2>📋 Оформление заказа</h2>
            <p>Заполните контактные данные для получения заказа</p>
        </div>
        <div class="form-body">
            <div class="info-row" id="addressInfo">
                <span>📍 Выбранный ПВЗ:</span>
                <span id="selectedAddressDisplay"></span>
            </div>

            <div id="yandexFormContainer" class="yandex-form-container">
                <div class="loading">
                    Загрузка формы...
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        Нажимая «Отправить заявку», вы соглашаетесь с обработкой персональных данных
    </div>
</div>

<script async src="https://ndd-widget.landpro.site/widget.js"></script>

<script>
    // ========== ВАШИ ДАННЫЕ ==========
    const YANDEX_FORM_URL = 'https://forms.yandex.ru/u/69dfdfa4e010db47b08a5d5d/';
    const ADDRESS_FIELD_ID = 'answer_short_text_9008975534367130';
    
    // ========== ИНИЦИАЛИЗАЦИЯ ВИДЖЕТА ==========
    (function(w) {
        function startWidget() {
            w.YaDelivery.createWidget({
                containerId: 'delivery-widget',
                params: {
                    city: "Москва",
                    size: {
                        "height": "450px",
                        "width": "100%"
                    },
                    source_platform_station: "019d3de27dbe7528b7854111b06a0fd4",
                    physical_dims_weight_gross: 100,
                    delivery_price: "от 0 р.",
                    delivery_term: "от 1 дня",
                    show_select_button: true,
                    filter: {
                        type: ["pickup_point", "terminal"],
                        is_yandex_branded: false,
                        payment_methods: ["already_paid", "card_on_receipt"],
                        payment_methods_filter: "or"
                    }
                },
            });
        }
        w.YaDelivery
            ? startWidget()
            : document.addEventListener('YaNddWidgetLoad', startWidget);
    })(window);

    // ========== ФУНКЦИЯ ЗАГРУЗКИ ФОРМЫ ==========
    function loadYandexForm(address) {
        const container = document.getElementById('yandexFormContainer');
        if (!container) return;
        
        container.innerHTML = '';
        
        const iframe = document.createElement('iframe');
        
        let formUrl = YANDEX_FORM_URL;
        if (address && address !== '') {
            formUrl += `?${ADDRESS_FIELD_ID}=${encodeURIComponent(address)}`;
        }
        
        iframe.src = formUrl;
        iframe.setAttribute('frameborder', '0');
        iframe.style.height = '650px';
        iframe.style.width = '100%';
        
        container.appendChild(iframe);
        
        iframe.addEventListener('load', function() {
            setTimeout(() => {
                try {
                    iframe.style.height = '700px';
                } catch(e) {}
            }, 500);
        });
    }
    
    // ========== ОБРАБОТКА ВЫБОРА ПВЗ ==========
    function setAddressDisplay(address) {
        const displaySpan = document.getElementById('selectedAddressDisplay');
        const infoRow = document.getElementById('addressInfo');
        
        if (displaySpan && infoRow) {
            displaySpan.textContent = address;
            infoRow.style.display = 'flex';
        }
    }

    function scrollToForm(address) {
        const formBlock = document.getElementById('order-form-block');
        if (formBlock) {
            formBlock.style.display = 'block';
            formBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            formBlock.style.transition = 'box-shadow 0.3s';
            formBlock.style.boxShadow = '0 0 0 3px #667eea, 0 20px 35px -10px rgba(0,0,0,0.15)';
            setTimeout(function() {
                formBlock.style.boxShadow = '';
            }, 1500);
            
            loadYandexForm(address);
            
            return true;
        }
        return false;
    }
    
    // ========== ОБРАБОТКА ВЫБОРА ПВЗ ==========
    document.addEventListener('YaNddWidgetPointSelected', function (data) {
        if (data.detail && data.detail.address && data.detail.address.full_address) {
            const fullAddress = data.detail.address.full_address;
            console.log('✅ ВЫБРАН ПВЗ:', fullAddress);
            setAddressDisplay(fullAddress);
            
            setTimeout(function() {
                scrollToForm(fullAddress);
            }, 300);
        }
    });
</script>
</body>
</html>
