<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Спасибо за заказ!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .thanks-card {
            background: white;
            border-radius: 48px;
            padding: 50px 35px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            color: #1a2c3e;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }

        .btn-telegram {
            background: #0088cc;
            color: white;
        }

        .btn-telegram:hover {
            background: #006699;
            transform: scale(1.02);
        }

        .btn-shop {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-shop:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 500px) {
            .thanks-card {
                padding: 35px 20px;
            }
            .buttons {
                flex-direction: column;
            }
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="thanks-card">
        <div class="icon">🎉</div>
        <h1>Спасибо за заказ!</h1>
        <p>Ваша заявка принята. Мы свяжемся с вами в ближайшее время.</p>
        
        <div class="buttons">
            <a href="https://t.me/@stom_tochka" target="_blank" class="btn btn-telegram">
                📱 Написать в Telegram
            </a>
            <a href="https://checkout.tochka.com/stom-tochka" target="_blank" class="btn btn-shop">
                🛍️ Перейти в магазин
            </a>
        </div>
    </div>
</div>
</body>
</html>
